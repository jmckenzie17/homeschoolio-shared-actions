name: Test semver-release workflow

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Lint semver-release.yml with actionlint
        uses: rhysd/actionlint@393031adb9afb225ee52ae2ccd7a5af5525e03e8 # v1.7.11
        with:
          files: .github/workflows/semver-release.yml

  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Write default semantic-release config (mirrors reusable workflow default)
        run: |
          cat > .releaserc-default.json <<'EOF'
          {
            "branches": ["main"],
            "tagFormat": "v${version}",
            "plugins": [
              "@semantic-release/commit-analyzer",
              "@semantic-release/release-notes-generator",
              "@semantic-release/github"
            ]
          }
          EOF

      - name: Verify semantic-release can parse commits (dry run)
        run: |
          npx --yes semantic-release --dry-run --no-ci --extends ./.releaserc-default.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sha-pinning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Verify no mutable tag references in semver-release.yml
        run: |
          if grep -E "uses:.*@(v[0-9]+|main|master|latest)$" .github/workflows/semver-release.yml; then
            echo "ERROR: Mutable tag references found. All actions must be pinned to a commit SHA."
            exit 1
          fi
          echo "OK: All action references are SHA-pinned."
