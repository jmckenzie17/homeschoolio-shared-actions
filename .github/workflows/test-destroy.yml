name: Test destroy workflow

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Lint destroy.yml with actionlint
        uses: rhysd/actionlint@393031adb9afb225ee52ae2ccd7a5af5525e03e8 # v1.7.11
        with:
          args: .github/workflows/destroy.yml

  sha-pinning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Verify no mutable tag references in destroy.yml
        run: |
          if grep -E "uses:.*@(v[0-9]+|main|master|latest)$" .github/workflows/destroy.yml; then
            echo "ERROR: Mutable tag references found. All actions must be pinned to a commit SHA."
            exit 1
          fi
          echo "OK: All action references are SHA-pinned."
