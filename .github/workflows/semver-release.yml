name: Semver Release

on:
  workflow_call:
    inputs:
      release-branch:
        description: "Branch name that triggers a release evaluation on push"
        type: string
        default: "main"
      tag-prefix:
        description: "Prefix prepended to the SemVer number (e.g. 'v' produces 'v1.2.3')"
        type: string
        default: "v"
    outputs:
      release-created:
        description: "Whether a new release was published in this run ('true' or 'false' string)"
        value: ${{ jobs.release.outputs.release-created }}
      tag-name:
        description: "The full version tag created (e.g. 'v1.2.3'); empty if no release"
        value: ${{ jobs.release.outputs.tag-name }}
      major-tag:
        description: "The major pointer tag updated (e.g. 'v1'); empty if no release"
        value: ${{ jobs.release.outputs.major-tag }}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release-created: ${{ steps.semantic-release.outputs.new_release_published }}
      tag-name: ${{ steps.semantic-release.outputs.new_release_git_tag }}
      major-tag: ${{ steps.update-major-pointer.outputs.major_tag }}
    steps:
      # fetch-depth: 0 required — semantic-release reads full git tag history
      # to determine prior releases and calculate the next version correctly.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      # Write a default .releaserc.json that excludes @semantic-release/npm
      # (the default plugin set includes npm, which requires package.json).
      # If the consumer repo already has a .releaserc.json, that file takes
      # precedence — semantic-release discovers it automatically by convention.
      - name: Resolve semantic-release config
        id: config
        env:
          RELEASE_BRANCH: ${{ inputs.release-branch }}
          TAG_PREFIX: ${{ inputs.tag-prefix }}
        run: |
          DEFAULT_CONFIG='.releaserc-default.json'
          if [ -f ".releaserc.json" ] || [ -f ".releaserc.js" ] || [ -f ".releaserc.cjs" ] || [ -f "release.config.js" ] || [ -f "release.config.cjs" ]; then
            echo "Consumer config found — using it instead of built-in default."
          else
            cat > "${DEFAULT_CONFIG}" <<EOF
          {
            "branches": ["${RELEASE_BRANCH}"],
            "tagFormat": "${TAG_PREFIX}\${version}",
            "plugins": [
              "@semantic-release/commit-analyzer",
              "@semantic-release/release-notes-generator",
              "@semantic-release/github"
            ]
          }
          EOF
            echo "No consumer config found — wrote built-in default to ${DEFAULT_CONFIG}."
          fi

      - name: Run semantic-release
        id: semantic-release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          semantic_version: 25
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # new_release_published is a string output — compare with == 'true', not == true.
      - name: Update major version pointer
        id: update-major-pointer
        if: steps.semantic-release.outputs.new_release_published == 'true'
        env:
          TAG: ${{ steps.semantic-release.outputs.new_release_git_tag }}
        run: |
          # MAJOR is extracted from the full tag — each release only updates its
          # own major pointer. e.g. v2.0.0 → MAJOR=v2, leaving v1 untouched.
          MAJOR=${TAG%%.*}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "${MAJOR}" -m "Update ${MAJOR} tag to ${TAG}"
          git push origin "${MAJOR}" --force
          echo "major_tag=${MAJOR}" >> "${GITHUB_OUTPUT}"
