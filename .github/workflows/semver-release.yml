name: Semver Release

on:
  workflow_call:
    inputs:
      release-branch:
        description: "Branch name that triggers a release evaluation on push"
        type: string
        default: "main"
      tag-prefix:
        description: "Prefix prepended to the SemVer number (e.g. 'v' produces 'v1.2.3')"
        type: string
        default: "v"
      config-file:
        description: "Relative path to the release-please config file in the consumer repo"
        type: string
        default: ".release-please-config.json"
    outputs:
      release-created:
        description: "Whether a new release was published in this run ('true' or 'false')"
        value: ${{ jobs.release-please.outputs.release-created }}
      tag-name:
        description: "The full version tag created (e.g. 'v1.2.3')"
        value: ${{ jobs.release-please.outputs.tag-name }}
      major-tag:
        description: "The major pointer tag updated (e.g. 'v1')"
        value: ${{ jobs.release-please.outputs.major-tag }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release-created: ${{ steps.release-please.outputs.release_created }}
      tag-name: ${{ steps.release-please.outputs.tag_name }}
      major-tag: ${{ steps.update-major-pointer.outputs.major_tag }}
    steps:
      # fetch-depth: 0 is required for git tag operations in the pointer update step
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      # Write a default release-please config so consumers need zero setup files.
      # If the consumer repo already has a config at the configured path, use that
      # instead — consumer config always wins.
      - name: Resolve release-please config
        id: config
        env:
          CONFIG_FILE: ${{ inputs.config-file }}
        run: |
          DEFAULT_CONFIG='.release-please-config-default.json'
          cat > "${DEFAULT_CONFIG}" <<'EOF'
          {
            "$schema": "https://raw.githubusercontent.com/googleapis/release-please/main/schemas/config.json",
            "release-type": "simple",
            "packages": { ".": {} }
          }
          EOF
          if [ -f "${CONFIG_FILE}" ]; then
            echo "config=${CONFIG_FILE}" >> "${GITHUB_OUTPUT}"
          else
            echo "config=${DEFAULT_CONFIG}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Run release-please
        id: release-please
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: ${{ steps.config.outputs.config }}
          target-branch: ${{ inputs.release-branch }}
          tag-prefix: ${{ inputs.tag-prefix }}

      # Use release_created (singular) — releases_created (plural) is a known v4
      # bug that always returns 'true' regardless of whether a release was created.
      - name: Update major version pointer
        id: update-major-pointer
        if: steps.release-please.outputs.release_created == 'true'
        env:
          VERSION: ${{ steps.release-please.outputs.tag_name }}
        run: |
          # MAJOR is extracted from the full tag — each release only updates its
          # own major pointer. e.g. v2.0.0 → MAJOR=v2, leaving v1 untouched.
          MAJOR=${VERSION%%.*}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "${MAJOR}" -m "Update ${MAJOR} tag to ${VERSION}"
          git push origin "${MAJOR}" --force
          echo "major_tag=${MAJOR}" >> "${GITHUB_OUTPUT}"
