name: Validate

on:
  workflow_call:
    inputs:
      opentofu-version:
        description: OpenTofu CLI version to install
        type: string
        default: "1.6.2"
      terragrunt-version:
        description: Terragrunt CLI version to install
        type: string
        default: "0.56.3"
      working-directory:
        description: Repository root; defaults to repo root
        type: string
        default: "."
    secrets:
      backend-credentials:
        description: Azure credentials for backend init (optional)
        required: false
    outputs:
      validation-passed:
        description: "true if all roots passed validation"
        value: ${{ jobs.validate.outputs.validation-passed }}

jobs:
  validate:
    name: Validate OpenTofu/Terragrunt
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    outputs:
      validation-passed: ${{ steps.result.outputs.passed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ inputs.opentofu-version }}

      - name: Install Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ inputs.terragrunt-version }}/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Check HCL formatting
        run: tofu fmt -check -recursive

      - name: Validate all modules
        run: |
          find modules -mindepth 1 -maxdepth 1 -type d | while read -r module; do
            echo "=== Validating $module ==="
            tofu -chdir="$module" init -backend=false -no-color
            tofu -chdir="$module" validate -no-color
          done

      - name: Set result
        id: result
        if: success()
        run: echo "passed=true" >> "$GITHUB_OUTPUT"
