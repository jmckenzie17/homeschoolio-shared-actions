name: Apply

on:
  workflow_call:
    inputs:
      target-environment:
        description: One of dev, staging, or production
        type: string
        required: true
      opentofu-version:
        description: OpenTofu CLI version to install
        type: string
        default: "1.6.2"
      terragrunt-version:
        description: Terragrunt CLI version to install
        type: string
        default: "0.56.3"
    secrets:
      azure-client-id:
        required: true
      azure-tenant-id:
        required: true
      azure-subscription-id:
        required: true
      github-token:
        required: true
    outputs:
      applied-sha:
        description: Commit SHA successfully applied
        value: ${{ jobs.apply.outputs.applied-sha }}

jobs:
  apply:
    name: Apply to ${{ inputs.target-environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.target-environment }}
    outputs:
      applied-sha: ${{ steps.apply.outputs.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ inputs.opentofu-version }}

      - name: Install Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ inputs.terragrunt-version }}/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Cache OpenTofu providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: tofu-providers-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: tofu-providers-${{ runner.os }}-

      - name: Pre-apply plan (verify non-empty)
        run: |
          cd environments/${{ inputs.target-environment }}
          terragrunt run-all init -upgrade -no-color
          terragrunt run-all plan -out=tfplan.binary -detailed-exitcode -no-color
          EXIT=$?
          # exit code 2 = changes present (expected), 0 = no changes, 1 = error
          if [ "$EXIT" -eq 0 ]; then
            echo "::notice::No changes to apply for ${{ inputs.target-environment }}. Skipping apply."
            echo "no-changes=true" >> "$GITHUB_ENV"
          elif [ "$EXIT" -ne 2 ]; then
            echo "::error::terragrunt plan failed with exit code $EXIT"
            exit 1
          fi
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.azure-client-id }}
          ARM_TENANT_ID: ${{ secrets.azure-tenant-id }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.azure-subscription-id }}

      - name: Apply to ${{ inputs.target-environment }}
        id: apply
        if: env.no-changes != 'true'
        run: |
          cd environments/${{ inputs.target-environment }}
          terragrunt run-all apply -auto-approve -no-color
          echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.azure-client-id }}
          ARM_TENANT_ID: ${{ secrets.azure-tenant-id }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.azure-subscription-id }}
